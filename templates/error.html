{% extends "base.html" %}
{% block title %}{{ code }} — SecureAuth{% endblock %}
{% block content %}
<div class="card" style="text-align:center">
  <div style="font-family:var(--mono);font-size:4rem;font-weight:700;color:var(--border);margin-bottom:.5rem">{{ code }}</div>
  <h2 class="card-title" style="text-align:center">{{ message }}</h2>
  <p style="color:var(--muted);margin:1rem 0 1.5rem;font-size:.875rem">Something went wrong. Use the link below to navigate back.</p>
  <a href="{{ url_for('index') }}" class="btn btn-ghost">← Go Home</a>
</div>
{% endblock %}
