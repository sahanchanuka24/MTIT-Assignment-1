<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Security headers hint (also set these server-side in production) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" />
  <title>{% block title %}SecureAuth{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --accent:   #00e5a0;
      --accent2:  #0066ff;
      --danger:   #ff3b5c;
      --warn:     #ffb020;
      --text:     #e8e8f0;
      --muted:    #6b6b85;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'Space Grotesk', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,.9);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-family: var(--mono);
      font-size: .95rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .05em;
    }
    .brand span { color: var(--muted); }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .875rem;
      transition: color .2s;
    }
    nav a:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }

    .card-title {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: .25rem;
      color: var(--text);
    }
    .card-sub {
      font-size: .825rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ── Form Elements ── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: .75rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: .5rem;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .875rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(0,102,255,.12);
    }
    input.is-invalid { border-color: var(--danger); }

    .field-error {
      font-size: .75rem;
      color: var(--danger);
      margin-top: .35rem;
      font-family: var(--mono);
    }

    /* ── Password strength bar ── */
    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: .4rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width .3s, background .3s;
    }

    /* ── Checkbox ── */
    .check-group {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .check-group input[type="checkbox"] { accent-color: var(--accent); }
    .check-group label {
      margin: 0;
      font-family: var(--sans);
      text-transform: none;
      letter-spacing: 0;
      font-size: .875rem;
      color: var(--muted);
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: .8rem;
      border: none;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.99); }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    /* ── Flash Messages ── */
    .alerts { margin-bottom: 1.25rem; }
    .alert {
      padding: .6rem 1rem;
      border-radius: 2px;
      font-size: .825rem;
      font-family: var(--mono);
      margin-bottom: .5rem;
      border-left: 3px solid transparent;
    }
    .alert-success { background: rgba(0,229,160,.08); border-color: var(--accent);  color: var(--accent); }
    .alert-danger   { background: rgba(255,59,92,.08);  border-color: var(--danger);  color: var(--danger); }
    .alert-warning  { background: rgba(255,176,32,.08); border-color: var(--warn);    color: var(--warn); }
    .alert-info     { background: rgba(0,102,255,.08);  border-color: var(--accent2); color: var(--accent2); }

    .card-footer {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .825rem;
      color: var(--muted);
    }
    .card-footer a { color: var(--accent2); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Grid bg decoration ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30,30,46,.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,30,46,.5) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<div class="page">
  <nav>
    <a href="/" class="brand">// <span>MTIT</span> Assignment 1</a>
    <div>
      {% if session.user_id %}
        <form method="POST" action="{{ url_for('logout') }}" style="display:inline">
          {{ logout_csrf() if logout_csrf is defined }}
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <p>IT22231864</p>
        </form>
      {% else %}
        <p>IT22231864</p>
      {% endif %}
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>
</div>
{% block extra_js %}{% endblock %}
</body>
</html>
